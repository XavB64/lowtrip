version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "📦 back:"
    open-pull-requests-limit: 100
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/frontend/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "📦 front:"
    open-pull-requests-limit: 100
    labels:
      - "dependencies"
    ignore:
      # ESLint 10 is not yet supported by eslint-plugin-react-hooks
      # and typescript-eslint. Installing it causes npm peer dependency
      # resolution failures (ERESOLVE). Keep ESLint on 9.x until the
      # ecosystem publishes ESLint 10 support.
      - dependency-name: "eslint"
        versions:
          - ">=10 <11"
      - dependency-name: "@eslint/js"
        versions:
          - ">=10 <11"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
