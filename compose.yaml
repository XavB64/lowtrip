services:
  backend:
    build:
      context: backend
    ports:
      - 8000:8000
    command: ["gunicorn", "--bind", "0.0.0.0:8000", "app:app"]
    env_file:
      - ./backend/.env
  frontend:
    build:
      context: frontend
    ports:
      - 3000:3000
    command: ["npm", "run", "start", "--", "--host", "0.0.0.0"]
